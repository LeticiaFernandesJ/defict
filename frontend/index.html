<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Aplica o tema salvo antes do primeiro paint, para não "piscar" claro→escuro.
      (function () {
        try {
          var t = localStorage.getItem('deficit_theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B2A4A" />

    <!-- PWA / instalável como app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Déficit" />

    <title>Déficit | controle calórico inteligente</title>
    <meta
      name="description"
      content="Déficit é um app para acompanhar alimentação, peso, hidratação e treino, com IA que calcula nutrientes e monta seu cardápio. Registre e mantenha a consistência do seu déficit calórico."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Déficit  seu déficit calórico, sob controle e com inteligência" />
    <meta
      property="og:description"
      content="Registre refeições, peso e água. A IA calcula calorias e macros, monta cardápio e analisa seu dia. Instalável como app (PWA)."
    />
    <meta property="og:image" content="/hero.png" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
